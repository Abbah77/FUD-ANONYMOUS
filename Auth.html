<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | FUD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-grad:#E19678; --bg-color: #fff; --success: #10b981; --error: #ef4444; --info: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #message-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; }
        .message { padding: 15px 20px; border-radius: 10px; margin-bottom: 10px; text-align: center; font-weight: 600; font-size: 14px; color: white; animation: slideDown 0.3s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .message.success { background-color: var(--success); }
        .message.error { background-color: var(--error); }
        .app-card { background: #fff; width: 100%; max-width: 400px; height: 90vh; max-height: 700px; margin: 20px; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header-overlay { position: absolute; top: 0; width: 100%; height: 35%; background: var(--primary-grad); z-index: 10; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .forms-wrapper { position: absolute; top: 35%; width: 100%; height: 65%; background: white; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .app-card.signup-active .header-overlay { top: 65%; border-radius: 35px 35px 0 0; }
        .app-card.signup-active .forms-wrapper { top: 0; }
        .form-page { position: absolute; width: 100%; height: 100%; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .input-group { width: 100%; margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 16px; background: #f1f5f9; border: 2px solid transparent; border-radius: 15px; outline: none; font-size: 14px; }
        input:focus { border-color: #E19678; background: #fff; }
        .main-btn { width: 100%; padding: 16px; background: var(--primary-grad); border: none; border-radius: 15px; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .ghost-btn { background: rgba(255, 255, 255, 0.2); border: 1.5px solid white; padding: 10px 25px; border-radius: 30px; color: white; font-size: 12px; cursor: pointer; }
        .signup-content, .signup-form { opacity: 0; pointer-events: none; }
        .signup-active .login-content, .signup-active .login-form { opacity: 0; pointer-events: none; }
        .signup-active .signup-content, .signup-active .signup-form { opacity: 1; pointer-events: all; }
        .toggle-pw { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; }
        .logo { height: 7vh; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="message-container"></div>

    <div class="app-card" id="appCard">
        <div class="header-overlay">
            <div class="header-content login-content">
                <img src="images/6.png" class="logo" alt="Logo">
                <p style="font-size: 13px; margin-bottom: 10px;">New to our platform?</p>
                <button class="ghost-btn" onclick="showSignup()">Create Account</button>
            </div>
            <div class="header-content signup-content" style="position: absolute;">
                <h1>Join Us!</h1>
                <p style="font-size: 13px; margin-bottom: 10px;">Already have an account?</p>
                <button class="ghost-btn" onclick="showLogin()">Sign In</button>
            </div>
        </div>

        <div class="forms-wrapper">
            <form id="loginForm" class="form-page login-form">             
                <h2>Sign In</h2>
                <div class="input-group">
                    <input type="text" id="loginRegNo" placeholder="REG NO" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fas fa-eye toggle-pw" onclick="togglePassword('loginPassword')"></i>
                </div>
                <button class="main-btn" type="submit">
                    <i class="fas fa-sign-in-alt"></i> <span>Login</span>
                </button>
            </form>

            <form id="signupForm" class="form-page signup-form">                        
                <h2>Create Account</h2>
                <div class="input-group">
                    <input type="text" id="signupName" placeholder="FULL NAME" required>
                </div>
                <div class="input-group">
                    <input type="text" id="signupRegNo" placeholder="REG NO" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password (min. 8 chars)" required minlength="8">
                    <i class="fas fa-eye toggle-pw" onclick="togglePassword('signupPassword')"></i>
                </div>
                <p style="font-size:12px; margin-top:8px; text-align:center;">
                    By signing up, you agree to our <a href="terms.html" target="_blank">Terms of Use & Privacy Policy</a>.
                </p>
                <button class="main-btn" type="submit">
                    <i class="fas fa-user-plus"></i> <span>Register</span>
                </button>
            </form>
        </div>
    </div>

<script>
    // API Configuration - Update this with your Render URL
    const API_BASE_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:8000' 
        : 'https://your-app-name.onrender.com'; // Update this after deployment

    // --- REGEX VALIDATION ---
    const regNoPattern = /^[A-Z]{3}\/[A-Z]{3}\/\d{2}\/\d{4}$/;

    function validateRegNo(regNo) {
        if (!regNoPattern.test(regNo)) {
            return "Invalid Format! Must be CAPS (e.g., CSC/SCI/22/0001)";
        }
        return null;
    }

    // UI Helpers
    window.showSignup = () => document.getElementById('appCard').classList.add('signup-active');
    window.showLogin = () => document.getElementById('appCard').classList.remove('signup-active');
    
    window.togglePassword = (id) => {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    };

    function showMessage(msg, type) {
        const container = document.getElementById('message-container');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = msg;
        container.appendChild(div);
        setTimeout(() => { 
            div.style.opacity = '0'; 
            setTimeout(() => div.remove(), 300); 
        }, 4000);
    }

    function setLoading(formId, isLoading) {
        const btn = document.querySelector(`#${formId} .main-btn`);
        const span = btn.querySelector('span');
        btn.disabled = isLoading;
        span.textContent = isLoading ? "Processing..." : (formId === 'loginForm' ? "Login" : "Register");
    }

    // --- SIGNUP ---
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('signupName').value.trim();
        const regNo = document.getElementById('signupRegNo').value.trim();
        const password = document.getElementById('signupPassword').value;

        // Validate REG NO
        const error = validateRegNo(regNo);
        if (error) return showMessage(error, "error");

        setLoading('signupForm', true);
        
        try {
            const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    full_name: name,
                    reg_no: regNo,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Registration failed');
            }

            // Store token
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            showMessage("Registration successful! Redirecting...", "success");
            setTimeout(() => window.location.href = "dashboard.html", 2000);
            
        } catch (err) {
            showMessage(err.message, "error");
        } finally {
            setLoading('signupForm', false);
        }
    });

    // --- LOGIN ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const regNo = document.getElementById('loginRegNo').value.trim();
        const password = document.getElementById('loginPassword').value;

        // Validate REG NO
        const error = validateRegNo(regNo);
        if (error) return showMessage(error, "error");

        setLoading('loginForm', true);
        
        try {
            const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    reg_no: regNo,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Login failed');
            }

            // Store token
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            showMessage("Welcome back! Redirecting...", "success");
            setTimeout(() => window.location.href = "dashboard.html", 1500);
            
        } catch (err) {
            showMessage(err.message, "error");
        } finally {
            setLoading('loginForm', false);
        }
    });
</script>
</body>
</html>
